apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: frontend-ingress
    namespace: portfolio-production
    annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
spec:
    ingressClassName: nginx
    tls:
        -   hosts:
                - rasmus.haversen.dk
                - www.rasmus.haversen.dk
            secretName: frontend-tls
    rules:
        -   host: rasmus.haversen.dk
            http:
                paths:
                    -   backend:
                            service:
                                name: frontend-service
                                port:
                                    number: 80
                        path: /
                        pathType: Prefix
        -   host: www.rasmus.haversen.dk
            http:
                paths:
                    -   backend:
                            service:
                                name: frontend-service
                                port:
                                    number: 80
                        path: /
                        pathType: Prefix
